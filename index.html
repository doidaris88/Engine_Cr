<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Growth Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0e1117; color: white; padding: 15px; }
        .card { background: #161616; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #333; }
        .price-up { color: #00ff00; }
        .price-down { color: #ff4b4b; }
        .buy-zone { background: #1a2e20; padding: 8px; border-radius: 5px; font-size: 0.9em; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
        h2 { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Rotation Engine</h2>
    <input type="text" id="capital" placeholder="Total Modal (IDR)" oninput="formatAndCalc(this)">
    <div id="dashboard">Memuat harga pasar...</div>

    <script>
        const assets = {
            "bitcoin": "BTC", "ethereum": "ETH", "solana": "SOL", "bittensor": "TAO"
        };

        function formatAndCalc(input) {
            let val = input.value.replace(/\D/g, "");
            input.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            update();
        }

        async function update() {
            const rawCapital = document.getElementById('capital').value.replace(/\./g, "");
            const capital = parseFloat(rawCapital) || 0;
            
            // Fetch harga + persentase perubahan 24h
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,bittensor&vs_currencies=idr&include_24hr_change=true');
            const data = await res.json();
            
            let html = "";
            for (let id in assets) {
                const price = data[id].idr;
                const change = data[id].idr_24h_change;
                const trendClass = change >= 0 ? "price-up" : "price-down";
                const icon = change >= 0 ? "▲" : "▼";
                
                // Menghitung Buy Zone (Rentang ideal 1% - 2% di bawah harga sekarang)
                const lowerBuy = price * 0.98;
                const upperBuy = price * 0.99;
                
                const allocation = capital * (id === 'bitcoin' ? 0.4 : id === 'ethereum' ? 0.25 : id === 'solana' ? 0.15 : 0.2);

                html += `
                <div class='card'>
                    <strong>${assets[id]}</strong> 
                    <span class='${trendClass}'>${icon} ${change.toFixed(2)}%</span><br>
                    <div style="font-size: 1.4em; margin: 5px 0;">Rp${price.toLocaleString('id-ID')}</div>
                    <small>Alokasi: Rp${allocation.toLocaleString('id-ID')}</small>
                    <div class='buy-zone'>
                        🎯 <b>Best Buy Signal:</b><br>
                        Rp${lowerBuy.toLocaleString('id-ID')} - Rp${upperBuy.toLocaleString('id-ID')}
                    </div>
                </div>`;
            }
            document.getElementById('dashboard').innerHTML = html;
        }

        // Refresh setiap 30 detik
        setInterval(update, 30000);
        update();
    </script>
</body>
</html>
