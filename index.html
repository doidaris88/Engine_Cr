<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Crypto Growth Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0e1117; color: white; padding: 20px; }
        .card { background: #161616; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #444; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; box-sizing: border-box; }
        .buy { color: #00ff00; font-weight: bold; }
        .price { font-size: 1.2em; color: #00d4ff; }
    </style>
</head>
<body>
    <h2>Rotation Engine (IDR)</h2>
    
    <div class="input-group">
        <label>Total Modal (IDR):</label>
        <input type="text" id="capital" placeholder="Contoh: 1.000.000" oninput="formatAndCalc(this)">
    </div>
    <div class="input-group">
        <label>Fee + Spread (%):</label>
        <input type="number" id="fee" value="1.5" oninput="update()">
    </div>

    <div id="dashboard"></div>

    <script>
        // Fungsi memformat input ribuan
        function formatAndCalc(input) {
            let value = input.value.replace(/\D/g, ""); // Hapus karakter non-digit
            input.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, "."); // Tambah titik
            update();
        }

        const assets = {
            "bitcoin": { name: "BTC", weight: 0.40 },
            "ethereum": { name: "ETH", weight: 0.25 },
            "solana": { name: "SOL", weight: 0.15 },
            "bittensor": { name: "TAO", weight: 0.20 }
        };

        async function update() {
            // Hapus titik untuk perhitungan
            const rawCapital = document.getElementById('capital').value.replace(/\./g, "");
            const capital = parseFloat(rawCapital);
            const feeRate = parseFloat(document.getElementById('fee').value) / 100 || 0;
            
            if (!capital) return;

            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,bittensor&vs_currencies=idr');
            const data = await res.json();
            
            let html = "";
            for (let id in assets) {
                const rawPrice = data[id].idr;
                const effectivePrice = rawPrice * (1 + feeRate);
                const allocation = capital * assets[id].weight;
                
                html += `<div class='card'>
                    <strong>${assets[id].name}</strong><br>
                    <span class='price'>Rp${rawPrice.toLocaleString('id-ID')}</span><br>
                    <small>Alokasi: Rp${allocation.toLocaleString('id-ID')}</small><br>
                    Status: <span class='buy'>READY</span>
                </div>`;
            }
            document.getElementById('dashboard').innerHTML = html;
        }
    </script>
</body>
</html>
