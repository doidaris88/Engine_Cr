<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Rotation Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0e1117; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; background: #262730; color: white; }
        .buy { color: #00ff00; font-weight: bold; }
        .sell { color: #ff4b4b; font-weight: bold; }
        .status { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <h2>Rotation Engine (IDR)</h2>
    <input type="number" id="capital" placeholder="Total Modal (IDR)" oninput="update()">
    <input type="number" id="fee" placeholder="Fee + Spread (%) misal: 1.5" value="1.5" oninput="update()">
    <div id="dashboard"></div>

    <script>
        const assets = {
            "bitcoin": { name: "BTC", weight: 0.40, target: 0 },
            "ethereum": { name: "ETH", weight: 0.25, target: 0 },
            "solana": { name: "SOL", weight: 0.15, target: 0 },
            "bittensor": { name: "TAO", weight: 0.20, target: 0 }
        };

        async function update() {
            const capital = parseFloat(document.getElementById('capital').value);
            const feeRate = parseFloat(document.getElementById('fee').value) / 100;
            if (!capital) return;

            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,bittensor&vs_currencies=idr');
            const data = await res.json();
            
            let html = "<h3>Status Portofolio:</h3>";
            for (let id in assets) {
                const rawPrice = data[id].idr;
                // Hitung harga setelah kena fee/spread Pluang
                const effectivePrice = rawPrice * (1 + feeRate);
                const targetAllocation = capital * assets[id].weight;
                
                // Signal Logic (Sederhana: Rebalancing)
                const action = (rawPrice < (rawPrice * 0.95)) ? "BUY (Rebalance)" : "HOLD/Profit Harvest";
                const signalClass = action.includes("BUY") ? "buy" : "sell";

                html += `<div class='card'>
                    <strong>${assets[id].name}</strong> <br>
                    Harga: Rp${rawPrice.toLocaleString()} <br>
                    <span class='status'>Efektif (Incl. Fee): Rp${effectivePrice.toLocaleString()}</span><br>
                    Alokasi Target: Rp${targetAllocation.toLocaleString()}<br>
                    Signal: <span class='${signalClass}'>${action}</span>
                </div>`;
            }
            document.getElementById('dashboard').innerHTML = html;
        }
    </script>
</body>
</html>
